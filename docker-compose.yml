version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: orcheflow_db
    environment:
      POSTGRES_USER: orcheflow
      POSTGRES_PASSWORD: orcheflow_dev
      POSTGRES_DB: orcheflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orcheflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp_server:
    build: ./mcp
    container_name: orcheflow_mcp
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://orcheflow:orcheflow_dev@postgres:5432/orcheflow

  agent_service:
    build: ./agents
    container_name: orcheflow_agents
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      - mcp_server
    environment:
      DATABASE_URL: postgresql+asyncpg://orcheflow:orcheflow_dev@postgres:5432/orcheflow
      MCP_SERVER_URL: http://mcp_server:8001

  api:
    build: ./api
    container_name: orcheflow_api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - agent_service
    environment:
      DATABASE_URL: postgresql+asyncpg://orcheflow:orcheflow_dev@postgres:5432/orcheflow
      AGENT_SERVICE_URL: http://agent_service:8002

volumes:
  pgdata:
