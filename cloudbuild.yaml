steps:
  # Build API (requires both frontend and api context)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/orcheflow/orcheflow-api:latest', '-f', 'api/Dockerfile', '.']

  # Build Agents
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/orcheflow/orcheflow-agents:latest', '-f', 'agents/Dockerfile', '.']

  # Build MCP
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/orcheflow/orcheflow-mcp:latest', '-f', 'mcp_server/Dockerfile', '.']

images: 
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/orcheflow/orcheflow-api:latest'
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/orcheflow/orcheflow-agents:latest'
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/orcheflow/orcheflow-mcp:latest'
