# .github/workflows/deploy.yml
# CI/CD: build, test, push to Artifact Registry, deploy 3 services to Cloud Run
# Auth: Workload Identity Federation (no long-lived keys)

name: OrcheFlowAI — Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'genai-apac-2026-491004' }}
  REGION: us-central1
  REPO: orcheflow

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio pytest-mock pytest-cov
          pip install -r agents/requirements.txt
          pip install -r api/requirements.txt
          pip install -r mcp_server/requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=. --cov-report=xml

  # ── Build & Push ────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push all images
        run: |
          # Build API
          gcloud builds submit ./api \
            --tag "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/orcheflow-api:${{ github.sha }}" \
            --project ${{ env.PROJECT_ID }}
          
          # Build Agents
          gcloud builds submit ./agents \
            --tag "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/orcheflow-agents:${{ github.sha }}" \
            --project ${{ env.PROJECT_ID }}
          
          # Build MCP
          gcloud builds submit ./mcp_server \
            --tag "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/orcheflow-mcp:${{ github.sha }}" \
            --project ${{ env.PROJECT_ID }}

          # Build Frontend (using a Dockerfile for Cloud Run)
          gcloud builds submit ./frontend \
            --tag "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/orcheflow-ui:${{ github.sha }}" \
            --project ${{ env.PROJECT_ID }}

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy MCP Server
        id: deploy-mcp
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: orcheflow-mcp
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/orcheflow-mcp:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: '--no-allow-unauthenticated --service-account=orcheflow-runtime@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Deploy Agent Service
        id: deploy-agents
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: orcheflow-agents
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/orcheflow-agents:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: '--no-allow-unauthenticated --service-account=orcheflow-runtime@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Deploy API Service
        id: deploy-api
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: orcheflow-api
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/orcheflow-api:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated 
            --service-account=orcheflow-runtime@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
            --set-env-vars=MCP_URL=${{ steps.deploy-mcp.outputs.url }},AGENT_URL=${{ steps.deploy-agents.outputs.url }}

      - name: Deploy Frontend UI
        id: deploy-ui
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: orcheflow-ui
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/orcheflow-ui:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated 
            --service-account=orcheflow-runtime@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
            --set-env-vars=VITE_API_BASE_URL=${{ steps.deploy-api.outputs.url }}
